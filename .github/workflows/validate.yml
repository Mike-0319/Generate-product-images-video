name: Validate Skill Repository

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill folders
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path.cwd()
          skill_files = sorted(root.rglob("SKILL.md"))
          if not skill_files:
              raise SystemExit("No SKILL.md files were found.")

          allowed_encodings = ("utf-8", "utf-8-sig", "gb18030")
          errors = []

          def decode_text(path: Path) -> tuple[str | None, str | None]:
              data = path.read_bytes()
              for encoding in allowed_encodings:
                  try:
                      return data.decode(encoding), encoding
                  except UnicodeDecodeError:
                      continue
              return None, None

          for skill_file in skill_files:
              skill_dir = skill_file.parent
              agent_file = skill_dir / "agents" / "openai.yaml"

              if not agent_file.exists():
                  errors.append(f"Missing agents/openai.yaml in {skill_dir}")

              text, encoding = decode_text(skill_file)
              if text is None:
                  errors.append(f"Could not decode {skill_file} with supported encodings: {allowed_encodings}")
                  continue

              if "\ufffd" in text:
                  errors.append(f"Replacement character found in {skill_file}")

              frontmatter = re.match(r"^---\r?\n(.*?)\r?\n---\r?\n", text, re.S)
              if not frontmatter:
                  errors.append(f"Missing YAML frontmatter in {skill_file}")
                  continue

              frontmatter_text = frontmatter.group(1)
              if not re.search(r"(?m)^name:\s*.+$", frontmatter_text):
                  errors.append(f"Missing 'name' in frontmatter: {skill_file}")
              if not re.search(r"(?m)^description:\s*.+$", frontmatter_text):
                  errors.append(f"Missing 'description' in frontmatter: {skill_file}")

              print(f"Validated {skill_file} using {encoding}")

          if errors:
              for error in errors:
                  print(error)
              raise SystemExit(1)
          PY
